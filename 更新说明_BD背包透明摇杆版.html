<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>更新说明</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans SC,sans-serif;background:#111018;color:#fff;padding:18px;line-height:1.7} .box{max-width:760px;margin:auto;background:#1a1623;border:1px solid #333;border-radius:16px;padding:20px} h1{margin-top:0} li{margin:8px 0} code{background:#2b2338;padding:2px 6px;border-radius:6px}</style><body><div class="box"><h1>萌渊地牢 更新说明</h1><p>这版重点优化了手机游玩观感和 BD 查看体验。</p><ul><li><b>新增“BD”按钮</b>：右上角点一下就能查看你当前身上的所有 BD。</li><li><b>新增顶部 BD 图标栏</b>：会显示最近获得的 8 个道具图标。</li><li><b>角色补了脚</b>：主角不再像之前那样怪，地面怪也加了更清楚的脚部/阴影。</li><li><b>立体感增强</b>：角色和怪物增加轻微浮动与地面阴影，看起来更立体。</li><li><b>透明摇杆</b>：摇杆进一步透明化，减少挡视线的问题。</li></ul><p>如果你 GitHub 上还是看到旧版，请刷新网址时加 <code>?v=4</code>，例如：<code>你的网址/?v=4</code></p></div></body></html>
